name: Build
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      - run: chmod +x gradlew && ./gradlew build
      - uses: actions/upload-artifact@v3
        with:
          name: pawpatrol-jar
          path: build/libs/*.jar
